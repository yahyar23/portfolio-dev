<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر العرض - التاجر</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --main-red: #e62e2e;
            --soft-gray: #f8f9fa;
            --border-radius: 15px;
        }
        body { background-color: #f4f7f6; font-family: 'Cairo', sans-serif; }
        .bg-light-custom { background-color: #f4f7f6; min-height: 100vh; }
        
        .custom-nav { background: #fff; border-bottom: 2px solid var(--main-red); }
        .search-input { border-radius: 20px; border: 1px solid #ddd; padding: 5px 20px; }

        .hero-banner {
            background: linear-gradient(45deg, #ff7675, #d63031);
            border-radius: var(--border-radius);
            color: white;
            padding: 40px;
            position: relative;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .product-card {
            border: none;
            border-radius: var(--border-radius);
            transition: 0.3s;
            overflow: hidden;
            background: #fff;
        }
        .product-card:hover { box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .product-image-wrapper {
            background: #f9f9f9;
            padding: 20px;
            position: relative;
            height: 250px; /* توحيد ارتفاع الصور */
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .product-image-wrapper img {
            max-height: 100%;
            object-fit: contain;
        }
        .discount-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--main-red);
            color: white;
            padding: 2px 10px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: bold;
            z-index: 2;
        }
        .btn-add-cart {
            background-color: var(--main-red);
            color: white;
            border-radius: 8px;
            width: 100%;
            border: none;
            padding: 8px;
            transition: 0.3s;
        }
        .btn-add-cart:hover { background-color: #c02626; color: white; }
        
        .promo-bar {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-top: 40px;
            border: 1px solid #eee;
        }
    </style>
</head>
<body>

<div class="bg-light-custom">
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
        <div class="container">
            <div class="d-flex align-items-center gap-3">
                <a href="#" class="text-danger fs-4 fw-bold text-decoration-none">التاجر</a>
                <button class="btn btn-primary btn-sm" data-bs-toggle="collapse" data-bs-target="#categoriesBar">
                    📂 الأقسام
                </button>
                <div class="input-group d-none d-md-flex">
                    <input type="text" class="form-control search-input" placeholder="ابحث عن المنتجات...">
                </div>
            </div>
            <div class="d-flex align-items-center gap-3">
                <button class="btn position-relative">
                    <i class="bi bi-cart3 fs-4"></i>
                    <span class="position-absolute top-0 start-0 badge rounded-pill bg-danger">3</span>
                </button>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <div class="hero-banner d-flex justify-content-between align-items-center">
            <div>
                <h1 class="fw-bold">تخفيضات كبرى</h1>
                <h2 class="display-4 fw-bold">حتى 50%</h2>
                <button class="btn btn-dark rounded-pill px-4 mt-3">تسوق الآن</button>
            </div>
            <div class="d-none d-md-block">
                <i class="bi bi-gift-fill" style="font-size: 100px; opacity: 0.3;"></i>
            </div>
        </div>

        <div id="categoriesBar" class="collapse mb-4">
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <div class="d-flex flex-wrap gap-2">
                        <button class="btn btn-outline-dark btn-sm">الكل</button>
                        <button class="btn btn-outline-primary btn-sm">ملابس رجالية</button>
                        <button class="btn btn-outline-primary btn-sm">إلكترونيات</button>
                        <button class="btn btn-outline-primary btn-sm">أحذية</button>
                    </div>
                </div>
            </div>
        </div>

        <h4 class="mb-4 fw-bold border-bottom pb-2">منتجات مختارة</h4>

        <div class="row g-4">
            
            <div class="col-lg-3 col-md-4 col-6">
                <div class="card product-card h-100 shadow-sm">
                    <div class="product-image-wrapper">
                        <span class="discount-badge">30% OFF</span>
                        <a href="detalis-prod.html"><img align="center" height="70%" width="70%" src="https://img-lcwaikiki.mncdn.com/mnpadding/480/640/ffffff/pim/productimages/20261/8403135/v1/l_20261-s61992z8-cvl-97-72-0-184_a.jpg" class="img-fluid rounded" alt="اسم المنتج"></a>
                    </div>
                    <div class="card-body text-center">
                        <h6 class="fw-bold mb-1">اسم المنتج التجريبي 1</h6>
                        <p class="text-muted small mb-2">قسم الأحذية</p>
                        <div class="d-flex justify-content-center align-items-center gap-2 mb-3">
                            <span class="text-danger fw-bold fs-5">99.00 $</span>
                        </div>
                        <button class="btn btn-add-cart d-flex align-items-center justify-content-center gap-2">
                            <i class="bi bi-plus-lg"></i> أضف إلى السلة
                        </button>
                    </div>
                </div>
            </div>

            <div class="col-lg-3 col-md-4 col-6">
                <div class="card product-card h-100 shadow-sm">
                    <div class="product-image-wrapper">
                     <a href="detalis-prod.html">  <img height="70%" width="70%" src="https://img-lcwaikiki.mncdn.com/mnpadding/480/640/ffffff/pim/productimages/20261/8470092/v1/l_20261-s66536z8-jqn-97-72-0-184_a.jpg" class="img-fluid rounded" alt="اسم المنتج"></a> 
                    </div>
                    <div class="card-body text-center">
                        <h6 class="fw-bold mb-1">اسم المنتج التجريبي 2</h6>
                        <p class="text-muted small mb-2">ساعات ذكية</p>
                        <div class="d-flex justify-content-center align-items-center gap-2 mb-3">
                            <span class="text-danger fw-bold fs-5">150.00 $</span>
                        </div>
                        <button class="btn btn-add-cart d-flex align-items-center justify-content-center gap-2">
                            <i class="bi bi-plus-lg"></i> أضف إلى السلة
                        </button>
                    </div>
                </div>
            </div>

            </div>

        <div class="row mt-5 text-center g-3 promo-bar">
            <div class="col-md-3 col-6">
                <i class="bi bi-shield-check text-danger fs-3"></i>
                <p class="mb-0 fw-bold">دفع آمن</p>
            </div>
            <div class="col-md-3 col-6">
                <i class="bi bi-truck text-danger fs-3"></i>
                <p class="mb-0 fw-bold">شحن سريع</p>
            </div>
            <div class="col-md-3 col-6">
                <i class="bi bi-arrow-left-right text-danger fs-3"></i>
                <p class="mb-0 fw-bold">إرجاع مجاني</p>
            </div>
            <div class="col-md-3 col-6">
                <i class="bi bi-headset text-danger fs-3"></i>
                <p class="mb-0 fw-bold">دعم 24/7</p>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
